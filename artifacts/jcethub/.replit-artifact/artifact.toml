kind = "web"
previewPath = "/"
title = "JCETHub"
version = "1.0.0"
id = "artifacts/jcethub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19904

[services.development]
run = "pnpm --filter @workspace/jcethub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jcethub", "run", "build" ]
publicDir = "artifacts/jcethub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19904"
BASE_PATH = "/"
