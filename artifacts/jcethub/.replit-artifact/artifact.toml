kind = "web"
previewPath = "/"
title = "JCETHub"
version = "1.0.0"
id = "artifacts/jcethub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19904

[services.development]
run = "pnpm --filter @workspace/jcethub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jcethub", "run", "build" ]
publicDir = "artifacts/jcethub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[[services.production.headers]]
from = "/index.html"
[services.production.headers.headers]
"Cache-Control" = "no-cache, no-store, must-revalidate"
"Pragma" = "no-cache"

[[services.production.headers]]
from = "/assets/*"
[services.production.headers.headers]
"Cache-Control" = "public, max-age=31536000, immutable"

[services.env]
PORT = "19904"
BASE_PATH = "/"
